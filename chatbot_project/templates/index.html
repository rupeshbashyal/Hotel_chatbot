{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Sunrise – Guest Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-input: #21262d;
            --accent: #c9a227;
            --accent-hover: #d4af37;
            --accent-muted: rgba(201, 162, 39, 0.15);
            --text: #e6edf3;
            --text-muted: #8b949e;
            --user-bubble: #238636;
            --user-bubble-bg: rgba(35, 134, 54, 0.2);
            --bot-bubble: #21262d;
            --border: #30363d;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            min-height: 100vh;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201, 162, 39, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(201, 162, 39, 0.04), transparent);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
        }
        .tagline {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Chat card */
        .chat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .chat-header-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            animation: pulse 2s ease-in-out infinite;
        }
        .chat-header-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Chat area */
        #chatbox {
            height: 380px;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #chatbox::-webkit-scrollbar {
            width: 6px;
        }
        #chatbox::-webkit-scrollbar-track {
            background: transparent;
        }
        #chatbox::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .msg {
            display: flex;
            gap: 0.5rem;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.bot { align-self: flex-start; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
        .msg.user .msg-avatar {
            background: var(--user-bubble-bg);
            color: var(--user-bubble);
        }
        .msg.bot .msg-avatar {
            background: var(--accent-muted);
            color: var(--accent);
        }

        .msg-bubble {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
        }
        .msg.user .msg-bubble {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.bot .msg-bubble {
            background: var(--bot-bubble);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
            margin-bottom: 0.25rem;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
        }
        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.4s ease-in-out infinite both;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        /* Input area */
        .input-area {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        #userInput {
            flex: 1;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-input);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #userInput::placeholder { color: var(--text-muted); }
        #userInput:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-muted);
        }

        .send-btn {
            padding: 0.85rem 1.25rem;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #0d1117;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:active { transform: scale(0.98); }

        /* Quick replies */
        .quick-replies {
            padding: 0 1.25rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .quick-btn {
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1 class="logo">Hotel Sunrise</h1>
            <p class="tagline">24/7 Guest Support · Ask us anything</p>
        </header>

        <div class="chat-card">
            <div class="chat-header">
                <span class="chat-header-dot"></span>
                <span class="chat-header-text">Online · Typically replies instantly</span>
            </div>

            <div id="chatbox">
                <div class="msg bot">
                    <div class="msg-avatar">☀</div>
                    <div>
                        <div class="msg-label">Hotel Sunrise</div>
                        <div class="msg-bubble">
                            Namaste! 🙏 Welcome to Hotel Sunrise. I'm here to help with booking, WiFi, parking, menu, check-in/out, location & more. How can I assist you?
                        </div>
                    </div>
                </div>
            </div>

            <div class="quick-replies">
                <button type="button" class="quick-btn" onclick="quickSend('room available?')">Room available?</button>
                <button type="button" class="quick-btn" onclick="quickSend('wifi password')">WiFi</button>
                <button type="button" class="quick-btn" onclick="quickSend('check in time')">Check-in</button>
                <button type="button" class="quick-btn" onclick="quickSend('parking')">Parking</button>
                <button type="button" class="quick-btn" onclick="quickSend('menu')">Menu</button>
                <button type="button" class="quick-btn" onclick="quickSend('help')">Help</button>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
                <button type="button" class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const parts = document.cookie.split(';');
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i].trim();
                    if (part.indexOf(name + '=') === 0) {
                        cookieValue = decodeURIComponent(part.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessage(content, isUser) {
            const chatbox = document.getElementById("chatbox");
            const msg = document.createElement("div");
            msg.className = "msg " + (isUser ? "user" : "bot");
            msg.innerHTML = '<div class="msg-avatar">' + (isUser ? "👤" : "☀") + '</div><div><div class="msg-label">' + (isUser ? "You" : "Hotel Sunrise") + '</div><div class="msg-bubble">' + content + '</div></div>';
            chatbox.appendChild(msg);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function addTyping() {
            const chatbox = document.getElementById("chatbox");
            const div = document.createElement("div");
            div.className = "msg bot";
            div.id = "typing-msg";
            div.innerHTML = '<div class="msg-avatar">☀</div><div><div class="msg-label">Hotel Sunrise</div><div class="msg-bubble typing"><span></span><span></span><span></span></div></div>';
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById("typing-msg");
            if (el) el.remove();
        }

        function quickSend(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById("userInput");
            const message = (input.value || "").trim();
            if (!message) return;

            const csrfToken = getCookie("csrftoken");
            const headers = {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken
            };

            addMessage(escapeHtml(message), true);
            input.value = "";
            addTyping();

            fetch("/get/", {
                method: "POST",
                headers: headers,
                body: JSON.stringify({ message: message })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                removeTyping();
                addMessage(escapeHtml(data.response), false);
            })
            .catch(function() {
                removeTyping();
                addMessage("Sorry, something went wrong. Please try again.", false);
            });
        }

        document.getElementById("userInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") { sendMessage(); }
        });
    </script>

</body>
</html>
